<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لعبة التراث - سيوة</title>

<style>

/* Background */
body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #2c1a0b, #8b5e34, #d4af37);
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Card */
.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 20px;
    width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* Title */
h1 {
    margin-bottom: 10px;
    color: #ffd700;
}

/* Progress Bar */
.progress {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin: 15px 0;
}

.progress-bar {
    height: 100%;
    background: #00ffcc;
    width: 0%;
    border-radius: 10px;
    transition: 0.4s;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    background: white;
    color: black;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #ffd700;
}

/* States */
.correct {
    background: #00c853 !important;
    color: white;
}

.wrong {
    background: #d50000 !important;
    color: white;
}

/* Text */
#level { color: #fff; }
#score { color: #00ffcc; }

/* End Message */
#end {
    font-size: 22px;
    color: #ffd700;
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="container">
<h1>🏺 لعبة تراث :contentReference[oaicite:0]{index=0}</h1>

<h3 id="level"></h3>
<h4 id="score"></h4>

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<p id="question"></p>
<div id="answers"></div>

<h2 id="end" style="display:none;">🎉 تهانينا! خلصت اللعبة 🎉</h2>
</div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

let level = 1;
let score = 0;

const questions = [
{q:"الخزف بيتصنع من ايه؟",a:["الطين","الحديد","الخشب"],correct:0},
{q:"النخيل بينتج ايه؟",a:["تمر","تفاح","عنب"],correct:0},
{q:"السعف هو؟",a:["أوراق النخيل","جذور","ثمار"],correct:0},
{q:"الجريد يستخدم في؟",a:["سلال","زجاج","بلاستيك"],correct:0},
{q:"التطريز هو؟",a:["تزيين القماش","طبخ","خشب"],correct:0},
{q:"الخزف بعد الحرق يصبح؟",a:["صلب","سائل","لين"],correct:0},
{q:"النخلة تحتاج؟",a:["شمس ومياه","ثلج","ظلام"],correct:0},
{q:"السعف يستخدم في؟",a:["حصير","حديد","موبايل"],correct:0},
{q:"الجريد جزء من؟",a:["النخلة","زهور","ثمار"],correct:0},
{q:"التطريز يستخدم في؟",a:["الملابس","السيارات","المعادن"],correct:0},
{q:"الخزاف يستخدم؟",a:["عجلة الفخار","كمبيوتر","سيف"],correct:0},
{q:"التمر غني ب؟",a:["سكر طبيعي","حديد","مياه"],correct:0},
{q:"السعف بعد التجفيف؟",a:["صلب","لين","سائل"],correct:0},
{q:"الجريد مفيد في؟",a:["بناء","طيران","كهرباء"],correct:0},
{q:"التطريز يدل على؟",a:["تراث","تكنولوجيا","صناعة"],correct:0},
{q:"الخزف يستخدم في؟",a:["أواني","هواتف","سيارات"],correct:0},
{q:"النخيل يعيش في؟",a:["الصحراء","ثلج","محيط"],correct:0},
{q:"السعف يدخل في؟",a:["سلال","زجاج","بلاستيك"],correct:0},
{q:"الجريد يستخدم في؟",a:["زراعة","فضاء","برمجة"],correct:0},
{q:"الملابس المطرزة؟",a:["تراث","عادية","صناعية"],correct:0}
];

function loadQuestion() {

if(level > questions.length){
document.getElementById("question").innerHTML="";
document.getElementById("answers").innerHTML="";
document.getElementById("end").style.display="block";
return;
}

let q = questions[level-1];

document.getElementById("question").innerText = q.q;
document.getElementById("level").innerText = "Level " + level;
document.getElementById("score").innerText = "Score: " + score;

// Progress bar
document.getElementById("progressBar").style.width = (level/questions.length)*100 + "%";

let answersDiv = document.getElementById("answers");
answersDiv.innerHTML="";

q.a.forEach((answer,index)=>{
let btn=document.createElement("button");
btn.innerText=answer;
btn.onclick=()=>checkAnswer(index);
answersDiv.appendChild(btn);
});
}

function checkAnswer(index){

let q = questions[level-1];
let buttons=document.querySelectorAll("button");

buttons.forEach((b,i)=>{
b.disabled=true;

if(i===q.correct){b.classList.add("correct");}
else{b.classList.add("wrong");}
});

if(index===q.correct){
score++;
document.getElementById("correctSound").play();
}else{
document.getElementById("wrongSound").play();
}

setTimeout(()=>{
level++;
loadQuestion();
},1000);
}

loadQuestion();

</script>

</body>
</html>
